name: Spotify to Telegram FLAC

on:
  workflow_dispatch:
    inputs:
      spotify_url:
        description: 'Paste your Spotify Playlist Link here'
        required: true
        type: string

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Audio Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Deno (Required for yt-dlp)
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Install Downloader Engine
        run: |
          pip install --upgrade pip
          pip install spotdl yt-dlp

      - name: Run Lossless Extraction (Decryption Mode)
        run: |
          spotdl download "${{ github.event.inputs.spotify_url }}" --format flac --no-cache --yt-dlp-args "--remote-components ejs:github"

      - name: Upload Audio Documents to Telegram Channel
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          for file in *.flac; do
            [ -e "$file" ] || continue
            curl -F chat_id="$CHAT_ID" -F document=@"$file" https://api.telegram.org/bot$BOT_TOKEN/sendDocument
            sleep 3
          done
